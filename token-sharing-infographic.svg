<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
  <defs>
    <!-- Gradients -->
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="tabGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="leaderGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="followerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="storageGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <!-- Arrow Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4facfe"/>
    </marker>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="100" fill="url(#headerGradient)" filter="url(#shadow)"/>
  <text x="600" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">Token Sharing Between Browser Tabs</text>
  <text x="600" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">Enterprise Application Architecture using Broadcast Channel API</text>

  <!-- Main Title Section -->
  <rect x="50" y="130" width="300" height="40" rx="8" fill="#fff" filter="url(#shadow)"/>
  <text x="200" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Leader-Follower Pattern</text>

  <!-- Browser Window Frame -->
  <rect x="50" y="180" width="1100" height="350" rx="15" fill="#2d3748" filter="url(#shadow)"/>
  <rect x="60" y="190" width="1080" height="30" rx="8" fill="#4a5568"/>
  <circle cx="85" cy="205" r="6" fill="#fc8181"/>
  <circle cx="105" cy="205" r="6" fill="#f6e05e"/>
  <circle cx="125" cy="205" r="6" fill="#68d391"/>
  <text x="600" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">Enterprise Application - Multiple Tabs</text>

  <!-- Tab 1 - Leader -->
  <rect x="80" y="240" width="320" height="260" rx="10" fill="url(#leaderGradient)" filter="url(#shadow)"/>
  <rect x="80" y="240" width="320" height="40" rx="10" fill="#ff6b6b"/>
  <text x="240" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">👑 Tab 1 - LEADER</text>
  
  <text x="95" y="300" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Responsibilities:</text>
  <text x="95" y="325" font-family="Arial, sans-serif" font-size="12" fill="#444">• Makes API calls to server</text>
  <text x="95" y="345" font-family="Arial, sans-serif" font-size="12" fill="#444">• Stores tokens in localStorage</text>
  <text x="95" y="365" font-family="Arial, sans-serif" font-size="12" fill="#444">• Broadcasts token updates</text>
  <text x="95" y="385" font-family="Arial, sans-serif" font-size="12" fill="#444">• Handles token refresh</text>
  
  <rect x="95" y="410" width="290" height="30" rx="5" fill="#fff" stroke="#ff6b6b" stroke-width="2"/>
  <text x="240" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff6b6b">User performs login here</text>
  
  <rect x="95" y="455" width="290" height="30" rx="5" fill="#fff" stroke="#4facfe" stroke-width="2"/>
  <text x="240" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">🔑 Token: eyJhbGciOiJIUzI1...</text>

  <!-- Tab 2 - Follower -->
  <rect x="440" y="240" width="320" height="260" rx="10" fill="url(#followerGradient)" filter="url(#shadow)"/>
  <rect x="440" y="240" width="320" height="40" rx="10" fill="#38b2ac"/>
  <text x="600" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">📡 Tab 2 - FOLLOWER</text>
  
  <text x="455" y="300" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Responsibilities:</text>
  <text x="455" y="325" font-family="Arial, sans-serif" font-size="12" fill="#444">• Listens to Broadcast Channel</text>
  <text x="455" y="345" font-family="Arial, sans-serif" font-size="12" fill="#444">• Updates local state on events</text>
  <text x="455" y="365" font-family="Arial, sans-serif" font-size="12" fill="#444">• NO API calls for auth</text>
  <text x="455" y="385" font-family="Arial, sans-serif" font-size="12" fill="#444">• Relies on leader tab</text>
  
  <rect x="455" y="410" width="290" height="30" rx="5" fill="#fff" stroke="#38b2ac" stroke-width="2"/>
  <text x="600" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#38b2ac">📡 Receiving broadcast events...</text>
  
  <rect x="455" y="455" width="290" height="30" rx="5" fill="#fff" stroke="#4facfe" stroke-width="2"/>
  <text x="600" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">🔑 Token: eyJhbGciOiJIUzI1...</text>

  <!-- Tab 3 - Follower -->
  <rect x="800" y="240" width="320" height="260" rx="10" fill="url(#followerGradient)" filter="url(#shadow)"/>
  <rect x="800" y="240" width="320" height="40" rx="10" fill="#38b2ac"/>
  <text x="960" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">📡 Tab 3 - FOLLOWER</text>
  
  <text x="815" y="300" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Responsibilities:</text>
  <text x="815" y="325" font-family="Arial, sans-serif" font-size="12" fill="#444">• Listens to Broadcast Channel</text>
  <text x="815" y="345" font-family="Arial, sans-serif" font-size="12" fill="#444">• Updates local state on events</text>
  <text x="815" y="365" font-family="Arial, sans-serif" font-size="12" fill="#444">• NO API calls for auth</text>
  <text x="815" y="385" font-family="Arial, sans-serif" font-size="12" fill="#444">• Relies on leader tab</text>
  
  <rect x="815" y="410" width="290" height="30" rx="5" fill="#fff" stroke="#38b2ac" stroke-width="2"/>
  <text x="960" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#38b2ac">📡 Receiving broadcast events...</text>
  
  <rect x="815" y="455" width="290" height="30" rx="5" fill="#fff" stroke="#4facfe" stroke-width="2"/>
  <text x="960" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">🔑 Token: eyJhbGciOiJIUzI1...</text>

  <!-- Broadcast Channel Arrows -->
  <path d="M 400 350 Q 440 320 440 350" stroke="#4facfe" stroke-width="3" fill="none" marker-end="url(#arrowhead-blue)"/>
  <path d="M 760 350 Q 800 320 800 350" stroke="#4facfe" stroke-width="3" fill="none" marker-end="url(#arrowhead-blue)"/>
  
  <text x="420" y="310" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4facfe">Broadcast</text>
  <text x="780" y="310" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4facfe">Channel</text>

  <!-- Auth Server Section -->
  <rect x="50" y="560" width="350" height="200" rx="15" fill="url(#serverGradient)" filter="url(#shadow)"/>
  <text x="225" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">🖥️ Auth Server</text>
  <text x="225" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0">Enterprise Backend</text>
  
  <text x="70" y="650" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">API Endpoints:</text>
  <text x="70" y="675" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">POST /api/login</text>
  <text x="70" y="695" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">POST /api/refresh</text>
  <text x="70" y="715" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">POST /api/logout</text>
  <text x="70" y="735" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">GET /api/health</text>

  <!-- LocalStorage Section -->
  <rect x="425" y="560" width="350" height="200" rx="15" fill="url(#storageGradient)" filter="url(#shadow)"/>
  <text x="600" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">💾 LocalStorage</text>
  <text x="600" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">Browser Storage</text>
  
  <text x="445" y="650" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Stored Data:</text>
  <rect x="445" y="665" width="310" height="60" rx="5" fill="#fff" fill-opacity="0.9"/>
  <text x="455" y="685" font-family="Arial, sans-serif" font-size="11" font-family="monospace" fill="#333">auth_tokens:</text>
  <text x="455" y="705" font-family="Arial, sans-serif" font-size="10" font-family="monospace" fill="#666">{</text>
  <text x="465" y="718" font-family="Arial, sans-serif" font-size="10" font-family="monospace" fill="#666">"accessToken": "eyJhbGci...",</text>
  <text x="465" y="730" font-family="Arial, sans-serif" font-size="10" font-family="monospace" fill="#666">"refreshToken": "refresh_...",</text>
  <text x="465" y="742" font-family="Arial, sans-serif" font-size="10" font-family="monospace" fill="#666">"expiresAt": 1234567890</text>
  <text x="455" y="754" font-family="Arial, sans-serif" font-size="10" font-family="monospace" fill="#666">}</text>

  <!-- Benefits Section -->
  <rect x="800" y="560" width="350" height="200" rx="15" fill="#fff" filter="url(#shadow)"/>
  <text x="975" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">✨ Enterprise Benefits</text>
  
  <text x="820" y="625" font-family="Arial, sans-serif" font-size="12" fill="#333">📉 Reduced API calls - Only leader tab</text>
  <text x="820" y="650" font-family="Arial, sans-serif" font-size="12" fill="#333">🔄 Consistency - Single source of truth</text>
  <text x="820" y="675" font-family="Arial, sans-serif" font-size="12" fill="#333">🛡️ Race condition prevention</text>
  <text x="820" y="700" font-family="Arial, sans-serif" font-size="12" fill="#333">⚡ Instant updates - No network latency</text>
  <text x="820" y="725" font-family="Arial, sans-serif" font-size="12" fill="#333">🔧 Reliability - Auto leader election</text>
  <text x="820" y="750" font-family="Arial, sans-serif" font-size="12" fill="#333">💼 Enterprise-grade security</text>

  <!-- Connection Lines -->
  <path d="M 240 500 L 240 540 L 225 560" stroke="#fff" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="250" y="535" font-family="Arial, sans-serif" font-size="11" fill="#fff">API Calls</text>
  
  <path d="M 240 500 L 240 540 L 600 560" stroke="#fff" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="400" y="535" font-family="Arial, sans-serif" font-size="11" fill="#fff">Store/Read</text>

  <!-- Event Flow Legend -->
  <rect x="50" y="780" width="1100" height="15" fill="#2d3748"/>
  <text x="600" y="792" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">Event Flow: User Action → API Call → LocalStorage → Broadcast Channel → All Tabs Update</text>
</svg>
